<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spark — Your Results</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="results.css"/>
  <script src="theme.js"></script>
  <script src="loader.js"></script>
</head>
<body>

  <canvas id="res-canvas"></canvas>

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark spark-nav fixed-top">
    <div class="container">
      <a class="navbar-brand spark-brand d-flex align-items-center gap-2" href="index.html">
          <img src="logo.png" alt="Spark" class="spark-logo" height="26" id="nav-logo"/>
          <span class="brand-text">Spark</span>
        </a>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-secondary btn-sm" id="btn-pdf">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span class="ms-1">Download PDF</span>
        </button>
        <button class="btn btn-outline-secondary btn-sm" onclick="window.location.href='quiz.html'">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
          <span class="ms-1">Retake</span>
        </button>
      </div>
    </div>
  </nav>

  <main class="res-main">
    <div class="container">

      <!-- HERO -->
      <div class="res-hero" id="res-hero">
        <div class="res-hero-glow"></div>
        <div class="res-badge">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <span class="ms-1">Your career matches are ready</span>
        </div>
        <h1 class="res-title mt-3">Hello, <span class="spark-highlight" id="res-name">there</span>.</h1>
        <p class="res-type" id="res-type">—</p>
        <p class="res-summary text-secondary" id="res-summary">
          <span class="loading-dots">Analysing your results<span>.</span><span>.</span><span>.</span></span>
        </p>
        <div class="res-stats mt-4">
          <div class="res-stat">
            <span id="stat-careers">4</span>
            <label>Matches found</label>
          </div>
          <div class="res-stat-sep"></div>
          <div class="res-stat">
            <span id="stat-top-match">—</span>
            <label>Top match score</label>
          </div>
          <div class="res-stat-sep"></div>
          <div class="res-stat">
            <span id="stat-salary">—</span>
            <label>Top salary range</label>
          </div>
        </div>
      </div>

      <!-- SECTION LABEL -->
      <div class="sec-label mt-5 mb-3">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
        <span>Matched careers</span>
      </div>

      <!-- CAREER CARDS -->
      <div class="row g-4" id="cards-row"></div>

      <!-- ROADMAP PANEL -->
      <div class="roadmap-panel" id="roadmap-panel" style="display:none">
        <div class="rm-header">
          <div class="rm-header-left">
            <div class="rm-icon-box" id="rm-icon"></div>
            <div>
              <div class="rm-label">Career Roadmap</div>
              <h3 class="rm-title" id="rm-title">—</h3>
            </div>
          </div>
          <button class="btn-icon" onclick="closeRoadmap()" title="Close">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="rm-section">
          <div class="rm-sec-label">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            Career path
          </div>
          <div id="rm-timeline"></div>
        </div>

        <div class="rm-section mt-4">
          <div class="rm-sec-label">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            Skills to build
          </div>
          <div class="rm-tags" id="rm-skills"></div>
        </div>

        <div class="rm-section mt-4">
          <div class="rm-sec-label">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Top companies hiring
          </div>
          <div class="rm-companies" id="rm-companies"></div>
        </div>
      </div>

      <!-- TRY AGAIN -->
      <div class="try-section">
        <div class="try-card">
          <div class="try-icon">
            <svg width="32" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
          </div>
          <h3>Want to explore more?</h3>
          <p class="text-secondary">Retake the quiz with fresh eyes — different answers reveal different paths.</p>
          <div class="d-flex gap-3 flex-wrap justify-content-center mt-4">
            <button class="btn spark-btn-primary btn-lg px-5" onclick="window.location.href='quiz.html'">
              Try again
            </button>
            <button class="btn btn-outline-secondary btn-lg px-4" onclick="window.location.href='profile.html'">
              Update profile
            </button>
          </div>
        </div>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="results.js"></script>
</body>
</html>
